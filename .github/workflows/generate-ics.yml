name: Generate DTY Calendar
on:
  push:
    paths: ['data.yaml', 'generate_ics.py']
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install icalendar pyyaml
    
    - name: Generate ICS
      run: python generate_ics.py
    
    - name: Commit ICS
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: update DTY calendar.ics"
        file_pattern: calendar.ics
